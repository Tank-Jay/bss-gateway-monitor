name: ONE-TIME Generate Release Keystore

# Runs only when triggered manually from Actions tab.
# Prints keystore as base64 + passwords in the log — copy them into repo secrets.
# After secrets are set, DELETE this workflow file.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate random passwords
        id: pw
        run: |
          STORE_PW=$(openssl rand -base64 18 | tr -d '=+/' | head -c 24)
          KEY_PW=$(openssl rand -base64 18 | tr -d '=+/' | head -c 24)
          echo "store_pw=$STORE_PW" >> $GITHUB_OUTPUT
          echo "key_pw=$KEY_PW" >> $GITHUB_OUTPUT

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias bss-release \
            -storepass "${{ steps.pw.outputs.store_pw }}" \
            -keypass "${{ steps.pw.outputs.key_pw }}" \
            -dname "CN=BSS Gateway, OU=BSS, O=BSS, L=Ahmedabad, ST=Gujarat, C=IN"

      - name: Show SHA-1 / SHA-256 fingerprints
        run: |
          keytool -list -v -keystore release.jks \
            -storepass "${{ steps.pw.outputs.store_pw }}" \
            -alias bss-release | grep -E 'SHA1|SHA256'

      - name: Encode keystore to base64
        run: |
          base64 -w 0 release.jks > release.jks.b64
          echo "===================================================="
          echo "COPY EACH BLOCK BELOW INTO A GITHUB SECRET"
          echo "===================================================="
          echo ""
          echo "Secret name: ANDROID_KEYSTORE_BASE64"
          echo "Value:"
          echo "--- BEGIN ---"
          cat release.jks.b64
          echo ""
          echo "--- END ---"
          echo ""
          echo "Secret name: ANDROID_KEYSTORE_PASSWORD"
          echo "Value: ${{ steps.pw.outputs.store_pw }}"
          echo ""
          echo "Secret name: ANDROID_KEY_PASSWORD"
          echo "Value: ${{ steps.pw.outputs.key_pw }}"
          echo ""
          echo "Secret name: ANDROID_KEY_ALIAS"
          echo "Value: bss-release"
          echo ""
          echo "===================================================="
          echo "After saving all 4 secrets in repo Settings > Secrets,"
          echo "DELETE this workflow file: generate-keystore.yml"
          echo "===================================================="

      - name: Upload keystore as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-backup
          path: release.jks
          retention-days: 90
