name: Build BSS Mobile App APK

on:
  # Trigger on push to main branch
  push:
    branches: [main, master]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-apk.yml'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        working-directory: ./mobile_app
        run: flutter doctor -v

      - name: Generate Android scaffolding
        working-directory: ./mobile_app
        # flutter create fills in android/, ios/, gradle files, MainActivity etc.
        # without overwriting pubspec.yaml, lib/, or our customized AndroidManifest.xml
        run: |
          flutter create \
            --project-name bss_gateway_monitor \
            --org com.bss.monitor \
            --platforms android \
            .

      - name: Install dependencies
        working-directory: ./mobile_app
        run: flutter pub get

      - name: Decode release keystore
        working-directory: ./mobile_app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            echo "Keystore decoded ($(wc -c < release.jks) bytes)"
          else
            echo "No keystore secret — using debug signing (apps will not upgrade in-place)"
          fi

      - name: Write key.properties (password file)
        working-directory: ./mobile_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Skipping — no keystore secret"
            exit 0
          fi
          # Write each line individually to avoid heredoc indentation issues
          # Use printf to avoid adding any trailing whitespace/newlines
          {
            printf 'storeFile=release.jks\n'
            printf 'storePassword=%s\n' "$STORE_PW"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PW"
          } > key.properties
          echo "key.properties written ($(wc -c < key.properties) bytes)"
          # Debug: show password lengths (not values) to detect truncation
          echo "STORE_PW length: ${#STORE_PW}"
          echo "KEY_PW length: ${#KEY_PW}"
          echo "KEY_ALIAS: $KEY_ALIAS"
          echo "key.properties content (values masked):"
          sed 's/=.*/=***/' key.properties

      - name: Configure release signing in build.gradle.kts
        working-directory: ./mobile_app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Skipping signing config patch"
            exit 0
          fi
          ls -la
          python3 <<'PY'
          import pathlib, re, sys
          kts = pathlib.Path("build.gradle.kts")
          groovy = pathlib.Path("build.gradle")

          if kts.exists():
              src = kts.read_text()
              # Top-of-file: load key.properties
              loader = '''import java.util.Properties
          import java.io.FileInputStream

          val keystorePropertiesFile = rootProject.file("key.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          '''
              # signingConfigs block referencing properties
              block = '''
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }
          '''
              # Insert loader at top of file (before plugins block or any other content)
              new_src = loader + src
              # Inject signingConfigs just before buildTypes
              new_src2 = re.sub(r"(\n\s*buildTypes\s*\{)", block + r"\1", new_src, count=1)
              # Repoint release buildType
              new_src3 = new_src2.replace(
                  'signingConfig = signingConfigs.getByName("debug")',
                  'signingConfig = signingConfigs.getByName("release")'
              )
              if new_src3 == new_src:
                  print("WARNING: no signing substitution occurred", file=sys.stderr)
                  print(new_src)
                  sys.exit(1)
              kts.write_text(new_src3)
              print("Patched build.gradle.kts (Kotlin DSL, reads key.properties)")
          elif groovy.exists():
              src = groovy.read_text()
              loader = '''def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          '''
              block = '''
              signingConfigs {
                  release {
                      keyAlias keystoreProperties["keyAlias"]
                      keyPassword keystoreProperties["keyPassword"]
                      storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                      storePassword keystoreProperties["storePassword"]
                  }
              }
          '''
              new_src = loader + src
              new_src2 = re.sub(r"(\n\s*buildTypes\s*\{)", block + r"\1", new_src, count=1)
              new_src3 = new_src2.replace(
                  "signingConfig signingConfigs.debug",
                  "signingConfig signingConfigs.release"
              )
              if new_src3 == new_src:
                  print("WARNING: no signing substitution occurred", file=sys.stderr)
                  print(new_src)
                  sys.exit(1)
              groovy.write_text(new_src3)
              print("Patched build.gradle (Groovy, reads key.properties)")
          else:
              print("ERROR: no gradle file", file=sys.stderr); sys.exit(1)
          PY
          echo "---AFTER PATCH (first 50 lines)---"
          [ -f build.gradle.kts ] && head -50 build.gradle.kts || head -50 build.gradle

      - name: Build release APK
        working-directory: ./mobile_app
        run: flutter build apk --release

      - name: Rename APK with build info
        working-directory: ./mobile_app
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/bss-gateway-monitor-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bss-gateway-monitor-apk
          path: mobile_app/dist/*.apk
          retention-days: 30

      - name: Read app version from pubspec
        id: pubspec
        working-directory: ./mobile_app
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v${VER}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pubspec.outputs.tag }}-build${{ github.run_number }}
          name: BSS Gateway Monitor ${{ steps.pubspec.outputs.tag }} (build ${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}.

            **Install:** download the APK below, then open it on Android to install.
          files: mobile_app/dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.pubspec.outputs.tag }} (build ${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** see the Releases page or this run's Artifacts section." >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`bss-gateway-monitor-${{ github.run_number }}.apk\`" >> $GITHUB_STEP_SUMMARY
