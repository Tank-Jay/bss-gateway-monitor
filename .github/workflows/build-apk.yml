name: Build BSS Mobile App APK

on:
  # Trigger on push to main branch
  push:
    branches: [main, master]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-apk.yml'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        working-directory: ./mobile_app
        run: flutter doctor -v

      - name: Generate Android scaffolding
        working-directory: ./mobile_app
        # flutter create fills in android/, ios/, gradle files, MainActivity etc.
        # without overwriting pubspec.yaml, lib/, or our customized AndroidManifest.xml
        run: |
          flutter create \
            --project-name bss_gateway_monitor \
            --org com.bss.monitor \
            --platforms android \
            .

      - name: Install dependencies
        working-directory: ./mobile_app
        run: flutter pub get

      - name: Decode release keystore
        working-directory: ./mobile_app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            echo "Keystore decoded ($(wc -c < release.jks) bytes)"
          else
            echo "No keystore secret — using debug signing (apps will not upgrade in-place)"
          fi

      - name: Configure release signing in build.gradle
        working-directory: ./mobile_app/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Skipping release signing config"
            exit 0
          fi
          # Inject signingConfigs + release buildType into build.gradle
          python3 <<'PY'
          import os, re, pathlib
          p = pathlib.Path("build.gradle")
          src = p.read_text()
          store_pw = os.environ['STORE_PW']
          key_pw = os.environ['KEY_PW']
          key_alias = os.environ['KEY_ALIAS']
          signing_block = f"""
              signingConfigs {{
                  release {{
                      storeFile file("release.jks")
                      storePassword "{store_pw}"
                      keyAlias "{key_alias}"
                      keyPassword "{key_pw}"
                  }}
              }}
          """
          # Inject signingConfigs before buildTypes
          src = re.sub(r"(\s*buildTypes\s*\{)", signing_block + r"\1", src, count=1)
          # Replace the debug signingConfig in release buildType
          src = src.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release"
          )
          p.write_text(src)
          print("build.gradle patched for release signing")
          PY
          grep -A 2 "signingConfigs" build.gradle | head -20

      - name: Build release APK
        working-directory: ./mobile_app
        run: flutter build apk --release

      - name: Rename APK with build info
        working-directory: ./mobile_app
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/bss-gateway-monitor-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bss-gateway-monitor-apk
          path: mobile_app/dist/*.apk
          retention-days: 30

      - name: Read app version from pubspec
        id: pubspec
        working-directory: ./mobile_app
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v${VER}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pubspec.outputs.tag }}-build${{ github.run_number }}
          name: BSS Gateway Monitor ${{ steps.pubspec.outputs.tag }} (build ${{ github.run_number }})
          body: |
            Automated build from commit ${{ github.sha }}.

            **Install:** download the APK below, then open it on Android to install.
          files: mobile_app/dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.pubspec.outputs.tag }} (build ${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** see the Releases page or this run's Artifacts section." >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`bss-gateway-monitor-${{ github.run_number }}.apk\`" >> $GITHUB_STEP_SUMMARY
