name: bss_gateway_monitor
description: BSS IoT Gateway BLE Monitor — ESP32-S3
publish_to: 'none'
version: 1.0.14+15

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.15
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  url_launcher: ^6.2.5
  package_info_plus: ^5.0.1
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0b1220"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  remove_alpha_ios: false

flutter_native_splash:
  color: "#0b1220"
  image: "assets/splash.png"
  android_12:
    color: "#0b1220"
    image: "assets/app_icon_foreground.png"
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/splash.png
